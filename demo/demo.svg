<svg
    id="heroArtwork"
    class="hero-svg"
    width="100%"
    height="100%"
    viewBox="0 0 1200 700"
    xmlns="http://www.w3.org/2000/svg"
>
    <!-- Background Gradient -->
    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4f46e5" />
            <stop offset="100%" stop-color="#7c3aed" />
        </linearGradient>

        <radialGradient id="blobGradient" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.9)" />
            <stop offset="100%" stop-color="rgba(255,255,255,0.1)" />
        </radialGradient>
    </defs>

    <!-- Background rectangle -->
    <rect id="backgroundRect" width="1200" height="700" fill="url(#bgGradient)" />

    <!-- Abstract Blob -->
    <g id="blobGroup">
        <path
            id="mainBlob"
            class="blob"
            d="M 450 200 
         Q 700 50 900 250 
         T 850 500 
         Q 600 650 400 550 
         T 350 300 Z"
            fill="url(#blobGradient)"
            opacity="0.8"
        />
    </g>

    <!-- Geometric floating circles -->
    <g id="floatingCircles">
        <circle
            id="circle1"
            class="float-circle"
            cx="250"
            cy="180"
            r="60"
            fill="#ffffff22"
            stroke="#ffffff55"
            stroke-width="2"
        />
        <circle
            id="circle2"
            class="float-circle"
            cx="1050"
            cy="420"
            r="80"
            fill="#ffffff22"
            stroke="#ffffff55"
            stroke-width="2"
        />
        <circle
            id="circle3"
            class="float-circle"
            cx="900"
            cy="120"
            r="40"
            fill="#ffffff22"
            stroke="#ffffff55"
            stroke-width="2"
        />
    </g>

    <!-- Pattern Lines -->
    <g id="patternLines" stroke="#ffffff33" stroke-width="2">
        <line id="line1" class="pattern-line" x1="100" y1="650" x2="1100" y2="100" />
        <line id="line2" class="pattern-line" x1="200" y1="600" x2="1150" y2="150" />
        <line id="line3" class="pattern-line" x1="300" y1="550" x2="1050" y2="50" />
    </g>

    <!-- Decorative triangles -->
    <g id="triangles" fill="#ffffff44">
        <polygon id="triangle1" class="triangle" points="200,200 240,270 160,270" />
        <polygon id="triangle2" class="triangle" points="1000,500 1050,580 950,580" />
    </g>
</svg>
